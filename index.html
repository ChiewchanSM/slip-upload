```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FinTech Slip Upload</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:12px;
    width:90%;
    max-width:400px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:20px;
}

.upload-box{
    border:2px dashed #ccc;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

input[type=file]{
    margin-top:10px;
}

button{
    background:#4facfe;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    width:100%;
}

button:hover{
    background:#2f8cff;
}

.note{
    font-size:13px;
    color:#666;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>Upload Payment Slip</h2>

<form action="YOUR_WEBHOOK_URL" method="post" enctype="multipart/form-data">

<div class="upload-box">
<p>Select or take a photo of your payment slip</p>
<input type="file" name="file" accept="image/*" capture="environment">
</div>

<button type="submit">Upload Slip</button>

</form>

<p class="note">Powered by FinTech Automation System</p>

</div>

</body>
</html>
```
